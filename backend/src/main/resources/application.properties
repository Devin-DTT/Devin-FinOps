# =============================================================================
# Devin Dashboard - Application Configuration
# =============================================================================

server.port=8080

# Actuator endpoints
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Logging
logging.level.com.devin.dashboard=DEBUG
logging.level.org.springframework.web.socket=INFO
logging.level.reactor.netty=INFO

# Spring application name
spring.application.name=devin-dashboard

# =============================================================================
# Dashboard configuration (override via env vars or command-line args)
# =============================================================================
dashboard.polling-interval-seconds=5
dashboard.org-discovery-refresh-seconds=60
dashboard.org-discovery-timeout-seconds=10
dashboard.scheduler-pool-size=2

# =============================================================================
# spring-dotenv bridge: maps env.* properties (from .env file) to plain names.
# New service user token names take priority; legacy names kept for backward compat.
# =============================================================================
DEVIN_ENTERPRISE_SERVICE_USER_TOKEN=${env.DEVIN_ENTERPRISE_SERVICE_USER_TOKEN:}
DEVIN_ENTERPRISE_SERVICE_TOKEN=${env.DEVIN_ENTERPRISE_SERVICE_TOKEN:}
DEVIN_ORG_SERVICE_USER_TOKEN=${env.DEVIN_ORG_SERVICE_USER_TOKEN:}
DEVIN_ORG_SERVICE_TOKEN=${env.DEVIN_ORG_SERVICE_TOKEN:}
DEVIN_ORG_ID=${env.DEVIN_ORG_ID:}
