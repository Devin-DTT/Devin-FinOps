# =============================================================================
# Devin FinOps Dashboard - Docker Compose (local development)
#
# Usage:
#   docker-compose up --build        # build and start both services
#   docker-compose up -d             # start in detached mode
#   docker-compose down              # stop and remove containers
#   docker-compose logs -f backend   # follow backend logs
#
# Environment variables are loaded automatically:
#   1. .env.example is always loaded (safe defaults / placeholders).
#   2. .env (if present) overrides with real tokens.
# To provide your real tokens, copy .env.example to .env and fill them in.
# =============================================================================

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: devin-finops-backend
    ports:
      - "8080:8080"
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    environment:
      - DASHBOARD_POLLING_INTERVAL_SECONDS=${DASHBOARD_POLLING_INTERVAL_SECONDS:-5}
      - DASHBOARD_ORG_DISCOVERY_REFRESH_SECONDS=${DASHBOARD_ORG_DISCOVERY_REFRESH_SECONDS:-60}
    volumes:
      - backend-data:/app/data
      - ./endpoints.yaml:/app/endpoints.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    container_name: devin-finops-frontend
    ports:
      - "4200:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend-data:
