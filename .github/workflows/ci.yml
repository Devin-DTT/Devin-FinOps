# =============================================================================
# Devin FinOps Dashboard - CI/CD Pipeline (Microservices)
#
# Triggers on push/PR to main. Runs:
#   1. Microservices: compile, test all Maven modules (parent reactor build)
#   2. Frontend: install, lint, build
#   3. Docker: build images for each microservice
# =============================================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Microservices (Java 17 + Maven - Reactor build)
  # ---------------------------------------------------------------------------
  microservices:
    name: Microservices - Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile all modules
        run: mvn clean compile -B -pl '!backend'

      - name: Run tests (skip backend legacy)
        run: mvn test -B -pl '!backend'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: microservices-test-results
          path: |
            services/*/target/surefire-reports/

  # ---------------------------------------------------------------------------
  # Legacy Backend (Java 17 + Maven) - kept for reference
  # ---------------------------------------------------------------------------
  backend:
    name: Backend (Legacy) - Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Copy endpoints.yaml to backend
        run: cp ../endpoints.yaml .

      - name: Compile
        run: mvn clean compile -B

      - name: Run tests
        run: mvn test -B

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/target/surefire-reports/

  # ---------------------------------------------------------------------------
  # Frontend (Node 18 + Angular 17)
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend - Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Build (production)
        run: npx ng build --configuration production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ---------------------------------------------------------------------------
  # Docker - Build images (validates Dockerfiles)
  # ---------------------------------------------------------------------------
  docker:
    name: Docker - Build Images
    runs-on: ubuntu-latest
    needs: [microservices, backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build api-gateway image
        run: docker build -t devin-finops-api-gateway:ci -f services/api-gateway/Dockerfile .

      - name: Build data-collector image
        run: docker build -t devin-finops-data-collector:ci -f services/data-collector/Dockerfile .

      - name: Build websocket-service image
        run: docker build -t devin-finops-websocket-service:ci -f services/websocket-service/Dockerfile .

      - name: Build sessions-service image
        run: docker build -t devin-finops-sessions-service:ci -f services/sessions-service/Dockerfile .

      - name: Build billing-service image
        run: docker build -t devin-finops-billing-service:ci -f services/billing-service/Dockerfile .

      - name: Build metrics-service image
        run: docker build -t devin-finops-metrics-service:ci -f services/metrics-service/Dockerfile .

      - name: Build admin-service image
        run: docker build -t devin-finops-admin-service:ci -f services/admin-service/Dockerfile .

      - name: Build frontend image
        run: docker build -t devin-finops-frontend:ci -f frontend/Dockerfile frontend/
