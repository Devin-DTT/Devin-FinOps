server:
  port: 8085

spring:
  application:
    name: metrics-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

metrics-config:
  redis-key-prefix: "finops:endpoint:"

logging:
  level:
    com.devin.finops.metrics: DEBUG
