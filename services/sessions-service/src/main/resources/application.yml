server:
  port: 8083

spring:
  application:
    name: sessions-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

sessions:
  redis-key-prefix: "finops:endpoint:"
  enterprise-token: ${DEVIN_ENTERPRISE_SERVICE_TOKEN:}
  org-token: ${DEVIN_ORG_SERVICE_TOKEN:}

logging:
  level:
    com.devin.finops.sessions: DEBUG
