replicaCount: 1

image:
  repository: devin-finops-websocket-service
  tag: latest
  pullPolicy: IfNotPresent

containerPort: 8082

healthCheck:
  path: /actuator/health

service:
  type: ClusterIP

env:
  - name: SPRING_DATA_REDIS_HOST
    value: "redis-master"

envFrom: []

resources:
  requests:
    cpu: 200m
    memory: 384Mi
  limits:
    cpu: 500m
    memory: 512Mi

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilization: 70
