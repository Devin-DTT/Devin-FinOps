replicaCount: 1

image:
  repository: devin-finops-api-gateway
  tag: latest
  pullPolicy: IfNotPresent

containerPort: 8080

healthCheck:
  path: /actuator/health

service:
  type: ClusterIP

env:
  - name: WEBSOCKET_SERVICE_URL
    value: "ws://websocket-service:8082"
  - name: SESSIONS_SERVICE_URL
    value: "http://sessions-service:8083"
  - name: BILLING_SERVICE_URL
    value: "http://billing-service:8084"
  - name: METRICS_SERVICE_URL
    value: "http://metrics-service:8085"
  - name: ADMIN_SERVICE_URL
    value: "http://admin-service:8086"
  - name: GATEWAY_JWT_ENABLED
    value: "false"
  - name: GATEWAY_CORS_ALLOWED_ORIGINS
    value: "http://localhost:4200"

envFrom: []

resources:
  requests:
    cpu: 200m
    memory: 384Mi
  limits:
    cpu: 500m
    memory: 512Mi

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilization: 70

ingress:
  enabled: false
  className: nginx
  host: ""
  annotations: {}
  tls: []
