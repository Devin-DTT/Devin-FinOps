{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: devin-api-tokens
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecrets.storeName }}
    kind: ClusterSecretStore
  target:
    name: devin-api-tokens
    creationPolicy: Owner
  data:
    - secretKey: DEVIN_ENTERPRISE_SERVICE_TOKEN
      remoteRef:
        key: {{ .Values.externalSecrets.remoteKey }}
        property: DEVIN_ENTERPRISE_SERVICE_TOKEN
    - secretKey: DEVIN_ORG_SERVICE_TOKEN
      remoteRef:
        key: {{ .Values.externalSecrets.remoteKey }}
        property: DEVIN_ORG_SERVICE_TOKEN
    - secretKey: DEVIN_ORG_ID
      remoteRef:
        key: {{ .Values.externalSecrets.remoteKey }}
        property: DEVIN_ORG_ID
{{- end }}
