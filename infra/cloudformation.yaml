          SecurityGroups:
            - !Ref ECSSecurityGroup
      ServiceRegistries:
        - RegistryArn: !GetAtt BillingServiceDiscoveryService.Arn

  # --- metrics-service: internal only, private subnet ---
  MetricsServiceECS:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub '${EnvironmentName}-metrics-service'
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref MetricsServiceTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !Ref PrivateSubnet1
            - !Ref PrivateSubnet2
          SecurityGroups:
            - !Ref ECSSecurityGroup
      ServiceRegistries:
        - RegistryArn: !GetAtt MetricsServiceDiscoveryService.Arn

  # --- admin-service: internal only, private subnet ---
  AdminServiceECS:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub '${EnvironmentName}-admin-service'
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref AdminServiceTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !Ref PrivateSubnet1
            - !Ref PrivateSubnet2
          SecurityGroups:
            - !Ref ECSSecurityGroup
      ServiceRegistries:
        - RegistryArn: !GetAtt AdminServiceDiscoveryService.Arn

  # --- frontend: load-balanced, public subnet ---
  FrontendService:
    Type: AWS::ECS::Service
    DependsOn: ALBListenerHTTP
    Properties:
      ServiceName: !Sub '${EnvironmentName}-frontend'
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref FrontendTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets:
            - !Ref PublicSubnet1
            - !Ref PublicSubnet2
          SecurityGroups:
            - !Ref ECSSecurityGroup
      LoadBalancers:
        - ContainerName: frontend
          ContainerPort: 80
          TargetGroupArn: !Ref FrontendTargetGroup

  # ---------------------------------------------------------------------------
  # Auto Scaling
  # ---------------------------------------------------------------------------

  # --- api-gateway: 1-3, CPU > 70% ---
  ApiGatewayScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    DependsOn: ApiGatewayService
    Properties:
      MaxCapacity: 3
      MinCapacity: 1
      ResourceId: !Sub 'service/${ECSCluster}/${EnvironmentName}-api-gateway'
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs
      RoleARN: !Sub 'arn:aws:iam::${AWS::AccountId}:role/aws-service-role/ecs.application-autoscaling.amazonaws.com/AWSServiceRoleForApplicationAutoScaling_ECSService'

  ApiGatewayScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub '${EnvironmentName}-api-gateway-cpu-scaling'
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ApiGatewayScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        TargetValue: 70.0
        ScaleInCooldown: 300
        ScaleOutCooldown: 60

  # --- websocket-service: 1-4, CPU > 70% ---
  WebSocketScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    DependsOn: WebSocketServiceECS
