  # ---------------------------------------------------------------------------
  # ECS Services (8 services)
  # ---------------------------------------------------------------------------

  # --- api-gateway: load-balanced, private subnet ---
  ApiGatewayService:
    Type: AWS::ECS::Service
    DependsOn:
      - ApiGatewayListenerRule
      - WebSocketListenerRule
    Properties:
      ServiceName: !Sub '${EnvironmentName}-api-gateway'
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref ApiGatewayTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !Ref PrivateSubnet1
            - !Ref PrivateSubnet2
          SecurityGroups:
            - !Ref ECSSecurityGroup
      LoadBalancers:
        - ContainerName: api-gateway
          ContainerPort: 8080
          TargetGroupArn: !Ref ApiGatewayTargetGroup
      ServiceRegistries:
        - RegistryArn: !GetAtt ApiGatewayDiscoveryService.Arn
      HealthCheckGracePeriodSeconds: 60

  # --- data-collector: internal only (singleton), private subnet ---
  DataCollectorService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub '${EnvironmentName}-data-collector'
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref DataCollectorTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !Ref PrivateSubnet1
            - !Ref PrivateSubnet2
          SecurityGroups:
            - !Ref ECSSecurityGroup
      ServiceRegistries:
        - RegistryArn: !GetAtt DataCollectorDiscoveryService.Arn

  # --- websocket-service: internal only, private subnet ---
  WebSocketServiceECS:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub '${EnvironmentName}-websocket-service'
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref WebSocketServiceTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !Ref PrivateSubnet1
            - !Ref PrivateSubnet2
          SecurityGroups:
            - !Ref ECSSecurityGroup
      ServiceRegistries:
        - RegistryArn: !GetAtt WebSocketServiceDiscoveryService.Arn

  # --- sessions-service: internal only, private subnet ---
  SessionsServiceECS:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub '${EnvironmentName}-sessions-service'
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref SessionsServiceTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !Ref PrivateSubnet1
            - !Ref PrivateSubnet2
