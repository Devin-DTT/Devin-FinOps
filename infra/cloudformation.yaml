    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub '${EnvironmentName}-billing-service'
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref BillingServiceTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
