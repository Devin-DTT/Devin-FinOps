# =============================================================================
# Outputs
# =============================================================================
Outputs:
  ALBDnsName:
    Description: DNS name of the Application Load Balancer
    Value: !GetAtt ALB.DNSName
    Export:
      Name: !Sub '${EnvironmentName}-alb-dns'

  DashboardUrl:
    Description: URL to access the dashboard
    Value: !If [HasHTTPS, !Sub 'https://${ALB.DNSName}', !Sub 'http://${ALB.DNSName}']

  RedisEndpoint:
    Description: Redis cluster endpoint
    Value: !GetAtt RedisCluster.RedisEndpoint.Address

  ServiceDiscoveryNamespaceName:
    Description: Cloud Map private DNS namespace
    Value: !Sub '${EnvironmentName}.local'

  ECSClusterName:
    Description: ECS cluster name
    Value: !Ref ECSCluster

  ApiGatewayECRUri:
    Description: ECR repository URI for the api-gateway image
    Value: !GetAtt ApiGatewayECR.RepositoryUri

  DataCollectorECRUri:
    Description: ECR repository URI for the data-collector image
    Value: !GetAtt DataCollectorECR.RepositoryUri

  WebSocketServiceECRUri:
    Description: ECR repository URI for the websocket-service image
    Value: !GetAtt WebSocketServiceECR.RepositoryUri

  SessionsServiceECRUri:
    Description: ECR repository URI for the sessions-service image
    Value: !GetAtt SessionsServiceECR.RepositoryUri

  BillingServiceECRUri:
    Description: ECR repository URI for the billing-service image
    Value: !GetAtt BillingServiceECR.RepositoryUri

  MetricsServiceECRUri:
    Description: ECR repository URI for the metrics-service image
    Value: !GetAtt MetricsServiceECR.RepositoryUri

  AdminServiceECRUri:
    Description: ECR repository URI for the admin-service image
    Value: !GetAtt AdminServiceECR.RepositoryUri

  FrontendECRUri:
    Description: ECR repository URI for the frontend image
    Value: !GetAtt FrontendECR.RepositoryUri
